workflows:
  android-workflow:
    name: Android Build
    instance_type: linux_x2
    max_build_duration: 120
    environment:
      java: openjdk/17
      ndk: 25.2.9519653
    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
    scripts:
      - name: Build APK
        script: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk
      
