workflows:
  android-workflow:
    name: Android Build
    instance_type: linux_x2
    max_build_duration: 120
    environment:
      java: openjdk/17
      ndk: 25.2.9519653
    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
    scripts:
      - name: Build APK
        script: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      - name: List build outputs
        script: |
          find . -name "*.apk" -type f
    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk
    publishing:
      email:
        recipients:
          - $PERSONAL_EMAIL
        notify:
          success: true
          failure: true

